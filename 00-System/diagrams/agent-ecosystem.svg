<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-read" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-write" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-exec" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97706"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1180" fill="#FAFAF9"/>

  <!-- Title band -->
  <text x="700" y="50" text-anchor="middle" font-size="30" font-weight="700" fill="#0F172A">Swan Agent Ecosystem</text>
  <text x="700" y="80" text-anchor="middle" font-size="16" fill="#475569">How agents, projects, and Obsidian interact — canonical knowledge, execution runtime, and ignition memory</text>

  <!-- VAULT PANEL (top, prominent) -->
  <rect x="80" y="120" width="1240" height="200" rx="16" fill="#EEF2FF" stroke="#4338CA" stroke-width="2"/>
  <text x="700" y="158" text-anchor="middle" font-size="22" font-weight="700" fill="#3730A3">📚 OBSIDIAN VAULT — Canonical Knowledge Layer</text>
  <text x="700" y="182" text-anchor="middle" font-size="13" fill="#4338CA" font-style="italic">~/project-folders/swan-vault/  ·  github.com/staffbotsteve/swan-vault</text>

  <!-- Vault subsections -->
  <g font-size="12" fill="#1E293B">
    <rect x="110" y="210" width="220" height="90" rx="8" fill="#FFFFFF" stroke="#818CF8"/>
    <text x="220" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#4338CA">01-Projects</text>
    <text x="220" y="252" text-anchor="middle">PROJECTS-MOC.md</text>
    <text x="220" y="268" text-anchor="middle">&lt;Project&gt;/CONTEXT.md</text>
    <text x="220" y="284" text-anchor="middle" fill="#64748B">authoritative per-project truth</text>

    <rect x="345" y="210" width="220" height="90" rx="8" fill="#FFFFFF" stroke="#818CF8"/>
    <text x="455" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#4338CA">03-Sessions</text>
    <text x="455" y="252" text-anchor="middle">Code/  ·  Cowork/  ·  Chat/</text>
    <text x="455" y="268" text-anchor="middle">YYYY-MM-DD-&lt;project&gt;.md</text>
    <text x="455" y="284" text-anchor="middle" fill="#64748B">written at every session end</text>

    <rect x="580" y="210" width="220" height="90" rx="8" fill="#FFFFFF" stroke="#818CF8"/>
    <text x="690" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#4338CA">05-Reference</text>
    <text x="690" y="252" text-anchor="middle">lessons/  ·  templates/</text>
    <text x="690" y="268" text-anchor="middle">cross-project patterns</text>
    <text x="690" y="284" text-anchor="middle" fill="#64748B">outlives any single project</text>

    <rect x="815" y="210" width="220" height="90" rx="8" fill="#FFFFFF" stroke="#818CF8"/>
    <text x="925" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#4338CA">00-System</text>
    <text x="925" y="252" text-anchor="middle">rules/ · standards/</text>
    <text x="925" y="268" text-anchor="middle">skills/ · agent-templates/</text>
    <text x="925" y="284" text-anchor="middle" fill="#64748B">agent OS documentation</text>

    <rect x="1050" y="210" width="240" height="90" rx="8" fill="#FFFFFF" stroke="#818CF8"/>
    <text x="1170" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#4338CA">02-Areas  ·  04-Daily</text>
    <text x="1170" y="252" text-anchor="middle">AI Infra · Real Estate</text>
    <text x="1170" y="268" text-anchor="middle">Aviation · Finance · Fitness</text>
    <text x="1170" y="284" text-anchor="middle" fill="#64748B">cross-cutting concerns</text>
  </g>

  <!-- Read/Write arrows between Vault and Agents -->
  <path d="M 500 320 L 500 440" stroke="#2563EB" stroke-width="3" fill="none" marker-end="url(#arrow-read)"/>
  <text x="490" y="385" text-anchor="end" font-size="13" font-weight="600" fill="#2563EB">READ</text>
  <text x="490" y="402" text-anchor="end" font-size="11" fill="#2563EB">context, decisions, lessons</text>

  <path d="M 900 440 L 900 320" stroke="#059669" stroke-width="3" fill="none" marker-end="url(#arrow-write)"/>
  <text x="910" y="385" text-anchor="start" font-size="13" font-weight="600" fill="#059669">WRITE</text>
  <text x="910" y="402" text-anchor="start" font-size="11" fill="#059669">sessions, CONTEXT updates, learnings</text>

  <!-- AGENTS band -->
  <rect x="80" y="440" width="1240" height="140" rx="16" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="700" y="472" text-anchor="middle" font-size="22" font-weight="700" fill="#065F46">🤖 AGENTS — Interfaces You Drive</text>

  <g font-size="13">
    <rect x="130" y="495" width="260" height="65" rx="8" fill="#FFFFFF" stroke="#10B981"/>
    <text x="260" y="518" text-anchor="middle" font-weight="600" fill="#065F46">Claude Code</text>
    <text x="260" y="536" text-anchor="middle" font-size="11" fill="#475569">terminal · IDE · this session</text>
    <text x="260" y="551" text-anchor="middle" font-size="11" fill="#475569">writes code, runs tools, commits</text>

    <rect x="405" y="495" width="260" height="65" rx="8" fill="#FFFFFF" stroke="#10B981"/>
    <text x="535" y="518" text-anchor="middle" font-weight="600" fill="#065F46">claude.ai (Chat)</text>
    <text x="535" y="536" text-anchor="middle" font-size="11" fill="#475569">browser · Claude Projects</text>
    <text x="535" y="551" text-anchor="middle" font-size="11" fill="#475569">research, drafts, exploration</text>

    <rect x="680" y="495" width="260" height="65" rx="8" fill="#FFFFFF" stroke="#10B981"/>
    <text x="810" y="518" text-anchor="middle" font-weight="600" fill="#065F46">Cowork (claude.com)</text>
    <text x="810" y="536" text-anchor="middle" font-size="11" fill="#475569">collaborative agent sessions</text>
    <text x="810" y="551" text-anchor="middle" font-size="11" fill="#475569">shared context, multi-step tasks</text>

    <rect x="955" y="495" width="290" height="65" rx="8" fill="#FFFFFF" stroke="#10B981"/>
    <text x="1100" y="518" text-anchor="middle" font-weight="600" fill="#065F46">OpenClaw · Paperclip (droplet)</text>
    <text x="1100" y="536" text-anchor="middle" font-size="11" fill="#475569">Opus CEO · Sonnet workers · iMessage</text>
    <text x="1100" y="551" text-anchor="middle" font-size="11" fill="#475569">multi-entity background ops</text>
  </g>

  <!-- Branching arrows to Memory / Execution -->
  <path d="M 260 580 L 260 640" stroke="#D97706" stroke-width="3" fill="none" marker-end="url(#arrow-exec)"/>
  <text x="265" y="612" font-size="11" font-weight="600" fill="#D97706">LOAD (auto)</text>

  <path d="M 1100 580 L 1100 640" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow-slate)"/>
  <text x="1105" y="612" font-size="11" font-weight="600" fill="#475569">INVOKE</text>

  <!-- MEMORY (Ignition) -->
  <rect x="120" y="640" width="490" height="180" rx="14" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="365" y="672" text-anchor="middle" font-size="20" font-weight="700" fill="#92400E">🧠 AGENT MEMORY — Ignition</text>
  <text x="365" y="694" text-anchor="middle" font-size="12" fill="#92400E" font-style="italic">~/.claude/projects/.../memory/</text>

  <rect x="145" y="708" width="440" height="98" rx="8" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="365" y="730" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">~7 pointer entries loaded into every conversation</text>
  <g font-size="11" fill="#475569">
    <text x="365" y="750" text-anchor="middle">user-profile · feedback rules · vault pointer</text>
    <text x="365" y="766" text-anchor="middle">project-folder template · gstack-learn sync</text>
  </g>
  <text x="365" y="792" text-anchor="middle" font-size="11" font-style="italic" fill="#92400E">"Read the vault for details — don't duplicate it here."</text>

  <!-- EXECUTION Layer -->
  <rect x="790" y="640" width="490" height="180" rx="14" fill="#F1F5F9" stroke="#475569" stroke-width="2"/>
  <text x="1035" y="672" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">⚙️ EXECUTION — Runtime</text>
  <text x="1035" y="694" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">~/.claude/  (skills, hooks, settings)</text>

  <g font-size="12">
    <rect x="815" y="708" width="140" height="50" rx="6" fill="#FFFFFF" stroke="#64748B"/>
    <text x="885" y="730" text-anchor="middle" font-weight="600" fill="#1E293B">skills/</text>
    <text x="885" y="748" text-anchor="middle" font-size="10" fill="#475569">gstack, built-ins</text>

    <rect x="965" y="708" width="140" height="50" rx="6" fill="#FFFFFF" stroke="#64748B"/>
    <text x="1035" y="730" text-anchor="middle" font-weight="600" fill="#1E293B">settings.json</text>
    <text x="1035" y="748" text-anchor="middle" font-size="10" fill="#475569">permissions, env</text>

    <rect x="1115" y="708" width="140" height="50" rx="6" fill="#FFFFFF" stroke="#64748B"/>
    <text x="1185" y="730" text-anchor="middle" font-weight="600" fill="#1E293B">hooks</text>
    <text x="1185" y="748" text-anchor="middle" font-size="10" fill="#475569">automation</text>
  </g>
  <text x="1035" y="792" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">Vault documents these in 00-System/skills/; execution happens here.</text>

  <!-- Arrow down to Projects -->
  <path d="M 700 820 L 700 880" stroke="#0891B2" stroke-width="3" fill="none" marker-end="url(#arrow-slate)"/>
  <text x="715" y="855" font-size="12" font-weight="600" fill="#0891B2">EDIT · RUN · DEPLOY</text>

  <!-- PROJECTS band -->
  <rect x="80" y="880" width="1240" height="140" rx="16" fill="#ECFEFF" stroke="#0891B2" stroke-width="2"/>
  <text x="700" y="912" text-anchor="middle" font-size="22" font-weight="700" fill="#155E75">💼 PROJECTS — The Work</text>
  <text x="700" y="934" text-anchor="middle" font-size="12" fill="#155E75" font-style="italic">~/project-folders/&lt;project&gt;/  ·  30-project portfolio</text>

  <g font-size="11">
    <rect x="130" y="950" width="160" height="55" rx="6" fill="#FFFFFF" stroke="#0891B2"/>
    <text x="210" y="972" text-anchor="middle" font-weight="600" fill="#155E75">app/</text>
    <text x="210" y="990" text-anchor="middle" fill="#475569">canonical code</text>

    <rect x="300" y="950" width="160" height="55" rx="6" fill="#FFFFFF" stroke="#0891B2"/>
    <text x="380" y="972" text-anchor="middle" font-weight="600" fill="#155E75">research/</text>
    <text x="380" y="990" text-anchor="middle" fill="#475569">specs, audits</text>

    <rect x="470" y="950" width="160" height="55" rx="6" fill="#FFFFFF" stroke="#0891B2"/>
    <text x="550" y="972" text-anchor="middle" font-weight="600" fill="#155E75">docs/</text>
    <text x="550" y="990" text-anchor="middle" fill="#475569">finished writing</text>

    <rect x="640" y="950" width="160" height="55" rx="6" fill="#FFFFFF" stroke="#0891B2"/>
    <text x="720" y="972" text-anchor="middle" font-weight="600" fill="#155E75">decks/</text>
    <text x="720" y="990" text-anchor="middle" fill="#475569">presentations</text>

    <rect x="810" y="950" width="160" height="55" rx="6" fill="#FFFFFF" stroke="#0891B2"/>
    <text x="890" y="972" text-anchor="middle" font-weight="600" fill="#155E75">assets/</text>
    <text x="890" y="990" text-anchor="middle" fill="#475569">diagrams, images</text>

    <rect x="980" y="950" width="160" height="55" rx="6" fill="#FFFFFF" stroke="#0891B2"/>
    <text x="1060" y="972" text-anchor="middle" font-weight="600" fill="#155E75">archive/</text>
    <text x="1060" y="990" text-anchor="middle" fill="#475569">abandoned, old</text>

    <rect x="1150" y="950" width="140" height="55" rx="6" fill="#F0FDFA" stroke="#0891B2" stroke-dasharray="4 2"/>
    <text x="1220" y="972" text-anchor="middle" font-weight="600" fill="#155E75">README.md</text>
    <text x="1220" y="990" text-anchor="middle" fill="#475569">→ vault CONTEXT</text>
  </g>

  <!-- External systems row -->
  <path d="M 260 1020 L 260 1060" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow-slate)"/>
  <path d="M 560 1020 L 560 1060" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow-slate)"/>
  <path d="M 860 1020 L 860 1060" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow-slate)"/>
  <path d="M 1160 1020 L 1160 1060" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrow-slate)"/>

  <g font-size="12">
    <rect x="160" y="1060" width="200" height="55" rx="6" fill="#F8FAFC" stroke="#64748B"/>
    <text x="260" y="1082" text-anchor="middle" font-weight="600" fill="#1E293B">GitHub</text>
    <text x="260" y="1100" text-anchor="middle" font-size="10" fill="#475569">staffbotsteve/* · code + vault</text>

    <rect x="460" y="1060" width="200" height="55" rx="6" fill="#F8FAFC" stroke="#64748B"/>
    <text x="560" y="1082" text-anchor="middle" font-weight="600" fill="#1E293B">Lovable</text>
    <text x="560" y="1100" text-anchor="middle" font-size="10" fill="#475569">no-code builds (Falcon MVP)</text>

    <rect x="760" y="1060" width="200" height="55" rx="6" fill="#F8FAFC" stroke="#64748B"/>
    <text x="860" y="1082" text-anchor="middle" font-weight="600" fill="#1E293B">Vercel · Supabase</text>
    <text x="860" y="1100" text-anchor="middle" font-size="10" fill="#475569">deploy · auth · Postgres + RLS</text>

    <rect x="1060" y="1060" width="200" height="55" rx="6" fill="#F8FAFC" stroke="#64748B"/>
    <text x="1160" y="1082" text-anchor="middle" font-weight="600" fill="#1E293B">Stripe · APIs</text>
    <text x="1160" y="1100" text-anchor="middle" font-size="10" fill="#475569">billing · LTI · integrations</text>
  </g>

  <!-- Legend -->
  <g font-size="11">
    <rect x="80" y="1140" width="1240" height="30" rx="6" fill="#F8FAFC" stroke="#CBD5E1"/>
    <line x1="110" y1="1155" x2="140" y2="1155" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow-read)"/>
    <text x="150" y="1159" fill="#1E293B">Read (context in)</text>

    <line x1="290" y1="1155" x2="320" y2="1155" stroke="#059669" stroke-width="3" marker-end="url(#arrow-write)"/>
    <text x="330" y="1159" fill="#1E293B">Write (outcomes out)</text>

    <line x1="485" y1="1155" x2="515" y2="1155" stroke="#D97706" stroke-width="3" marker-end="url(#arrow-exec)"/>
    <text x="525" y="1159" fill="#1E293B">Auto-load (ignition)</text>

    <line x1="685" y1="1155" x2="715" y2="1155" stroke="#475569" stroke-width="3" marker-end="url(#arrow-slate)"/>
    <text x="725" y="1159" fill="#1E293B">Invoke / Deploy</text>

    <text x="1300" y="1159" text-anchor="end" fill="#64748B" font-style="italic">Rule: vault is canonical. Memory holds pointers, not copies.</text>
  </g>
</svg>
